<!DOCTYPE html>
<html lang="{{ session.get('lang', 'zh') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('{{ url_for('static', filename='sw.js') }}');
    }
  </script>
  <title data-i18n="app_title">BaZi</title>
  <meta name="description" content="专业八字排盘系统，真太阳时计算，支持全球90+国家，多语言。免费在线四柱排盘与运势分析。">
  <meta property="og:title" content="BaZi Oracle - 专业八字排盘">
  <meta property="og:description" content="真太阳时精准排盘，支持全球90+国家，多语言八字分析系统">
  <meta property="og:type" content="website">
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
  <meta name="csrf-token" content="{{ csrf_token() }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=8.0">

  <script>
    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    let I18N = {};
    let currentLang = localStorage.getItem("lang") || "zh";

    async function loadLang(lang) {
      try {
        const res = await fetch('/static/i18n/' + lang + '.json?t=' + Date.now());
        if (!res.ok) throw new Error('Failed to load ' + lang);
        I18N = await res.json();
        currentLang = lang;
        localStorage.setItem("lang", lang);
        document.documentElement.lang = lang;
        applyI18N();
        if (typeof renderHomeFortune === 'function') renderHomeFortune();
        if (typeof renderResultFortune === 'function') renderResultFortune();
        if (typeof refreshDateSelects === 'function') refreshDateSelects();
        document.querySelectorAll('.lang-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.lang === lang);
        });
        // Show brief toast
        showToast(I18N.app_title_short || lang.toUpperCase());
      } catch(e) {
        console.error('loadLang error:', e);
      }
    }

    function showToast(msg) {
      var old = document.getElementById('langToast');
      if (old) old.remove();
      var t = document.createElement('div');
      t.id = 'langToast';
      t.textContent = msg;
      t.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(212,168,67,0.95);color:#000;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;transition:opacity 0.3s;opacity:1;';
      document.body.appendChild(t);
      setTimeout(function(){ t.style.opacity='0'; }, 1200);
      setTimeout(function(){ t.remove(); }, 1500);
    }

    function applyI18N() {
      // Translate text content
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (I18N[key]) {
          let text = I18N[key];
          // Handle {remaining} placeholder for rate limit errors
          if (text.indexOf('{remaining}') !== -1) {
            var remainingEl = document.getElementById('rateLimitRemaining');
            if (remainingEl) text = text.replace('{remaining}', remainingEl.textContent);
          }
          el.textContent = text;
        } else if (el.classList.contains('shensha-tag') && key) {
          el.textContent = key.replace('shensha_','').replace('_name','').replace(/_/g,' ');
        }
      });
      // Translate placeholders
      document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
        const key = el.getAttribute("data-i18n-placeholder");
        if (I18N[key]) el.placeholder = I18N[key];
      });
      // Translate titles
      document.querySelectorAll("[title-i18n]").forEach(el => {
        const key = el.getAttribute("title-i18n");
        if (I18N[key]) el.title = I18N[key];
      });
      // Translate select options
      document.querySelectorAll("select [data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (I18N[key]) el.textContent = I18N[key];
      });
      // Translate optgroups
      document.querySelectorAll("select optgroup[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (I18N[key]) el.label = I18N[key];
      });
    }

    // CSRF helper for API calls
    function getCsrfToken() {
      var meta = document.querySelector('meta[name="csrf-token"]');
      return meta ? meta.getAttribute('content') : '';
    }

    // Patched fetch that auto-injects CSRF token for POST/PUT/DELETE/PATCH
    var _origFetch = window.fetch;
    window.fetch = function(url, opts) {
      opts = opts || {};
      var method = (opts.method || 'GET').toUpperCase();
      if (['POST','PUT','DELETE','PATCH'].indexOf(method) !== -1) {
        opts.headers = opts.headers || {};
        if (!opts.headers['X-CSRF-Token'] && !opts.headers['x-csrf-token']) {
          opts.headers['X-CSRF-Token'] = getCsrfToken();
        }
      }
      return _origFetch.call(this, url, opts);
    };

    window.addEventListener("DOMContentLoaded", function() {
      window.scrollTo(0, 0);
      loadLang(currentLang);
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
      // 微信浏览器检测
      if (/MicroMessenger/i.test(navigator.userAgent)) {
        var tip = document.getElementById('wechatTip');
        if (tip && !localStorage.getItem('wechat_tip_closed')) {
          tip.style.display = 'block';
          // 调整容器顶部间距
          document.querySelectorAll('.container').forEach(function(c) {
            c.style.paddingTop = '100px';
          });
        }
      }
    });
  </script>
</head>

<body>

<canvas id="stars"></canvas>
<div id="spotlight"></div>

<a href="#main-content" class="skip-link" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;z-index:99999;background:var(--gold);color:#000;padding:8px 16px;font-weight:600;text-decoration:none;" onfocus="this.style.left='10px';this.style.top='10px'" onblur="this.style.left='-9999px'" data-i18n="skip_to_content">跳到主要内容</a>

<!-- 微信浏览器提示条 -->
<div class="wechat-tip" id="wechatTip" style="display:none;">
  <div class="wechat-tip-inner">
    <span class="wechat-tip-icon">📱</span>
    <span class="wechat-tip-text" data-i18n="wechat_tip_text">微信内置浏览器部分功能受限，建议点击右上角 ··· 选择"在浏览器中打开"以获得最佳体验</span>
    <button class="wechat-tip-close" onclick="document.getElementById('wechatTip').style.display='none';localStorage.setItem('wechat_tip_closed','1')" aria-label="Close">×</button>
  </div>
</div>

<!-- 语言选择弹窗 -->
<div class="lang-modal-overlay" id="langModal">
  <div class="lang-modal">
    <span class="lang-modal-icon">☯</span>
    <div class="lang-modal-title" data-i18n="lang_select_title">选择语言</div>
    <div class="lang-modal-desc" data-i18n="lang_select_desc">请选择您偏好的语言</div>
    <div class="lang-options">
      <button class="lang-option" data-lang-val="zh" onclick="selectLangModal(this)">
        <span class="lang-option-flag">🇨🇳</span>
        中文
      </button>
      <button class="lang-option" data-lang-val="ja" onclick="selectLangModal(this)">
        <span class="lang-option-flag">🇯🇵</span>
        日本語
      </button>
      <button class="lang-option" data-lang-val="en" onclick="selectLangModal(this)">
        <span class="lang-option-flag">🇬🇧</span>
        English
      </button>
      <button class="lang-option" data-lang-val="ko" onclick="selectLangModal(this)">
        <span class="lang-option-flag">🇰🇷</span>
        한국어
      </button>
        <button class="lang-option" data-lang-val="vi" onclick="selectLangModal(this)">
          <span class="lang-option-flag">🇻🇳</span>
          Tiếng Việt
        </button>
        <button class="lang-option" data-lang-val="my" onclick="selectLangModal(this)">
          <span class="lang-option-flag">🇲🇲</span>
          မြန်မာ
        </button>
    </div>
    <button class="lang-modal-confirm" onclick="confirmLangModal()" data-i18n="lang_select_confirm" aria-label="Confirm language selection">确认</button>
  </div>
</div>

<!-- 引导教程弹窗 -->
<div class="onboard-overlay hidden" id="onboardModal">
  <div class="onboard-modal">
    <button class="onboard-close" onclick="closeOnboard()" aria-label="Close tutorial">×</button>
    <span class="onboard-icon">☯</span>
    <div class="onboard-title" data-i18n="onboard_title">欢迎使用八字排盘</div>
    <div id="onboardContent">
      <div class="onboard-step-title" data-i18n="onboard_step1_title">什么是八字？</div>
      <div class="onboard-step-desc" data-i18n="onboard_step1_desc">八字（四柱）是基于出生年月日时的天干地支，结合节气与真太阳时进行推演的传统命理系统。</div>
    </div>
    <div class="onboard-dots">
      <div class="onboard-dot active" data-step="0"></div>
      <div class="onboard-dot" data-step="1"></div>
      <div class="onboard-dot" data-step="2"></div>
      <div class="onboard-dot" data-step="3"></div>
      <div class="onboard-dot" data-step="4"></div>
      <div class="onboard-dot" data-step="5"></div>
    </div>
    <div class="onboard-actions">
      <button class="onboard-btn onboard-btn-skip" onclick="closeOnboard()" data-i18n="onboard_skip">跳过教程</button>
      <button class="onboard-btn onboard-btn-next" onclick="nextOnboardStep()" data-i18n="onboard_next">下一步</button>
    </div>
  </div>
</div>

<!-- 加载动画 -->
<div class="loading-overlay" id="loadingOverlay" role="status" aria-live="polite">
  <div class="loading-spinner"></div>
  <div class="loading-text" data-i18n="loading_text">排盘中...</div>
</div>

<!-- 顶部导航 -->
<nav class="top-nav">
  <a href="/" class="nav-brand">
    <div class="nav-brand-icon">☯</div>
    <span class="nav-brand-text" data-i18n="app_title_short">八字排盘</span>
  </a>
  
  <div class="nav-actions">
    <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}" data-i18n="nav_home">首页</a>
    <a href="/history" class="nav-link {% if request.path == '/history' %}active{% endif %}" data-i18n="nav_history">历史</a>
    <a href="/explain" class="nav-link {% if request.path == '/explain' %}active{% endif %}" data-i18n="nav_learn">了解</a>
    
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle theme">
      <span id="themeIcon">🌙</span>
    </button>

    <div class="lang-switch">
      <button class="lang-btn" data-lang="zh" onclick="loadLang('zh')">中</button>
      <button class="lang-btn" data-lang="ja" onclick="loadLang('ja')">日</button>
      <button class="lang-btn" data-lang="en" onclick="loadLang('en')">EN</button>
      <button class="lang-btn" data-lang="ko" onclick="loadLang('ko')">한</button>
      <button class="lang-btn" data-lang="vi" onclick="loadLang('vi')">VI</button>
      <button class="lang-btn" data-lang="my" onclick="loadLang('my')">မြန်မာ</button>
    </div>
  </div>
</nav>

<a id="main-content" tabindex="-1"></a>

{% block content %}{% endblock %}

<!-- 底部导航（移动端） -->
<nav class="bottom-nav">
  <div class="bottom-nav-content">
    <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
      <span class="nav-item-icon">☰</span>
      <span data-i18n="nav_home">首页</span>
    </a>
    <a href="/" class="nav-item">
      <span class="nav-item-icon">☯</span>
      <span data-i18n="nav_bazi">排盘</span>
    </a>
    <a href="/history" class="nav-item {% if request.path == '/history' %}active{% endif %}">
      <span class="nav-item-icon">📋</span>
      <span data-i18n="nav_history">历史</span>
    </a>
    <a href="/explain" class="nav-item {% if request.path == '/explain' %}active{% endif %}">
      <span class="nav-item-icon">💡</span>
      <span data-i18n="nav_learn">了解</span>
    </a>
    <a href="javascript:void(0)" class="nav-item" onclick="document.getElementById('langModal').classList.remove('hidden')" role="button" aria-label="Change language">
      <span class="nav-item-icon">🌐</span>
      <span data-i18n="nav_lang">语言</span>
    </a>
  </div>
</nav>

<!-- 页脚 -->
<footer class="site-footer">
  <div class="footer-divider"></div>
  <div class="footer-bottom">
    <div class="footer-powered" data-i18n="footer_powered_by">Powered by BaZi Auto Chart System</div>
  </div>
</footer>

<script>
function showLoading() {
  document.getElementById('loadingOverlay').classList.add('active');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('active');
}

// ========================
// Theme Toggle
// ========================
function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme');
  var next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeIcon').textContent = next === 'light' ? '☀️' : '🌙';
}

(function() {
  var saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    var icon = document.getElementById('themeIcon');
    if (icon) icon.textContent = saved === 'light' ? '☀️' : '🌙';
  }
})();

// ========================
// 语言选择弹窗逻辑
// ========================
var selectedLangVal = localStorage.getItem('lang') || 'zh';

function selectLangModal(el) {
  document.querySelectorAll('.lang-option').forEach(function(o) { o.classList.remove('selected'); });
  el.classList.add('selected');
  selectedLangVal = el.getAttribute('data-lang-val');
}

function confirmLangModal() {
  localStorage.setItem('lang', selectedLangVal);
  localStorage.setItem('lang_selected', '1');
  loadLang(selectedLangVal);
  document.getElementById('langModal').classList.add('hidden');
  if (!localStorage.getItem('onboard_done')) {
    setTimeout(function() {
      document.getElementById('onboardModal').classList.remove('hidden');
    }, 400);
  }
}

(function() {
  var savedLang = localStorage.getItem('lang') || 'zh';
  var options = document.querySelectorAll('.lang-option');
  options.forEach(function(o) {
    if (o.getAttribute('data-lang-val') === savedLang) {
      o.classList.add('selected');
      selectedLangVal = savedLang;
    }
  });
  if (localStorage.getItem('lang_selected')) {
    document.getElementById('langModal').classList.add('hidden');
  }
})();

// Scroll to top on navigation
window.addEventListener('popstate', function() { window.scrollTo(0, 0); });
document.addEventListener('click', function(e) {
  var link = e.target.closest('a[href]');
  if (link && link.getAttribute('href') && !link.getAttribute('href').startsWith('#') && !link.getAttribute('href').startsWith('javascript:')) {
    var href = link.getAttribute('href');
    if (href !== window.location.pathname + window.location.search) {
      setTimeout(function() { window.scrollTo(0, 0); }, 50);
    }
  }
});

// ========================
// 粒子星空背景
// ========================
(function() {
  var canvas = document.getElementById('stars');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var particles = [];
  var count = 120;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 0.002 + 0.001,
      phase: Math.random() * Math.PI * 2,
      gold: Math.random() > 0.7
    });
  }

  var animId = null;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var t = Date.now() * 0.001;
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var alpha = 0.3 + 0.5 * Math.sin(t * p.speed * 100 + p.phase);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.gold
        ? 'rgba(201,168,76,' + alpha + ')'
        : 'rgba(232,220,200,' + alpha + ')';
      ctx.fill();
    }
    animId = requestAnimationFrame(draw);
  }
  draw();
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      if (animId) { cancelAnimationFrame(animId); animId = null; }
    } else if (!animId) {
      draw();
    }
  });
})();

// ========================
// 鼠标跟随光晕
// ========================
(function() {
  var el = document.getElementById('spotlight');
  if (!el) return;
  document.addEventListener('mousemove', function(e) {
    el.style.setProperty('--mx', e.clientX + 'px');
    el.style.setProperty('--my', e.clientY + 'px');
  });
})();

// ========================
// 滚动淡入 (Intersection Observer)
// ========================
(function() {
  var targets = document.querySelectorAll('.card, .bento-card, .action-card, .consult-card, .page-header, .hero-section, .tab-nav');
  targets.forEach(function(el) { el.classList.add('fade-in'); });

  if (!('IntersectionObserver' in window)) {
    targets.forEach(function(el) { el.classList.add('visible'); });
    return;
  }

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  targets.forEach(function(el) { observer.observe(el); });
})();

// ========================
// 卡片3D倾斜
// ========================
(function() {
  if (window.innerWidth <= 480) return;
  var cards = document.querySelectorAll('.card');
  cards.forEach(function(card) {
    card.classList.add('tilt-card');
    card.addEventListener('mousemove', function(e) {
      var rect = card.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var y = e.clientY - rect.top;
      var cx = rect.width / 2;
      var cy = rect.height / 2;
      var rx = ((y - cy) / cy) * -8;
      var ry = ((x - cx) / cx) * 8;
      card.style.transform = 'perspective(800px) rotateX(' + rx + 'deg) rotateY(' + ry + 'deg)';
    });
    card.addEventListener('mouseleave', function() {
      card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg)';
    });
  });
})();

// ========================
// 打字机效果 (Hero h1)
// ========================
(function() {
  var heroTitle = document.querySelector('.hero-title');
  if (!heroTitle) return;
  var fullText = heroTitle.textContent.trim();
  if (!fullText) return;
  heroTitle.textContent = '';
  var cursor = document.createElement('span');
  cursor.className = 'typewriter-cursor';
  heroTitle.appendChild(cursor);
  var i = 0;
  function typeChar() {
    if (i < fullText.length) {
      heroTitle.insertBefore(document.createTextNode(fullText[i]), cursor);
      i++;
      setTimeout(typeChar, 80);
    } else {
      setTimeout(function() { cursor.style.display = 'none'; }, 1500);
    }
  }
  setTimeout(typeChar, 500);
})();

// ========================
// 引导教程逻辑
// ========================
var onboardSteps = [
  { titleKey: 'onboard_step1_title', descKey: 'onboard_step1_desc', icon: '📖' },
  { titleKey: 'onboard_step2_title', descKey: 'onboard_step2_desc', icon: '📝' },
  { titleKey: 'onboard_step3_title', descKey: 'onboard_step3_desc', icon: '📋' },
  { titleKey: 'onboard_step4_title', descKey: 'onboard_step4_desc', icon: '🔒' },
  { titleKey: 'onboard_step5_title', descKey: 'onboard_step5_desc', icon: '🔮' },
  { titleKey: 'onboard_step6_title', descKey: 'onboard_step6_desc', icon: '💬' }
];
var currentOnboardStep = 0;

function renderOnboardStep() {
  var step = onboardSteps[currentOnboardStep];
  var content = document.getElementById('onboardContent');
  var icon = document.querySelector('.onboard-icon');
  icon.textContent = step.icon;
  content.innerHTML = '<div class="onboard-step-title" data-i18n="' + escapeHtml(step.titleKey) + '">' + escapeHtml(I18N[step.titleKey] || '') + '</div>' +
    '<div class="onboard-step-desc" data-i18n="' + escapeHtml(step.descKey) + '">' + escapeHtml(I18N[step.descKey] || '') + '</div>';
  // 更新指示点
  document.querySelectorAll('.onboard-dot').forEach(function(d, i) {
    d.classList.toggle('active', i === currentOnboardStep);
  });
  // 更新按钮
  var nextBtn = document.querySelector('.onboard-btn-next');
  if (currentOnboardStep === onboardSteps.length - 1) {
    nextBtn.setAttribute('data-i18n', 'onboard_start');
    nextBtn.textContent = I18N.onboard_start || '';
  } else {
    nextBtn.setAttribute('data-i18n', 'onboard_next');
    nextBtn.textContent = I18N.onboard_next || '';
  }
}

function nextOnboardStep() {
  if (currentOnboardStep < onboardSteps.length - 1) {
    currentOnboardStep++;
    renderOnboardStep();
  } else {
    closeOnboard();
  }
}

function closeOnboard() {
  document.getElementById('onboardModal').classList.add('hidden');
  localStorage.setItem('onboard_done', '1');
  localStorage.setItem('lang_selected', '1');
}
</script>

</body>
</html>
