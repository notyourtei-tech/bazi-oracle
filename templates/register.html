{% extends "base.html" %}
{% block content %}
<div class="container">
  <div class="card">
    <h1 data-i18n="register">注册</h1>

    {% if error %}
      <p class="warn">{{ error }}</p>
    {% endif %}

    <form method="post">
      <label data-i18n="email">邮箱</label>
      <input type="email" name="email" required>

      <label data-i18n="password">密码</label>
      <input type="password" name="password" required>

      <button type="submit" class="primary-btn" data-i18n="register">注册</button>
    </form>

    <div class="footer-links">
      <a href="{{ url_for('login') }}" data-i18n="go_login">去登录</a>
      <a href="{{ url_for('index') }}" data-i18n="back">返回</a>
    </div>
  </div>
</div>
{% endblock %}
