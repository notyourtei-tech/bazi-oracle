{% extends "base.html" %}
{% block content %}
<div class="container">
  <div class="page-header animate-fade">
    <h1 class="page-title">注册</h1>
  </div>

  <div class="card animate-slide" style="max-width: 400px; margin: 0 auto;">
    {% if error %}
    <div style="padding: 12px 16px; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: var(--radius-md); margin-bottom: 16px; color: var(--danger); font-size: 14px;">
      {{ error }}
    </div>
    {% endif %}

    <form method="post">
      <div class="form-group" style="margin-bottom: 16px;">
        <label class="form-label">姓名</label>
        <input type="text" name="username" class="form-input" placeholder="请输入姓名" required autocomplete="username">
      </div>
      
      <div class="form-group" style="margin-bottom: 24px;">
        <label class="form-label">密码</label>
        <input type="password" name="password" class="form-input" placeholder="请设置密码（至少6位）" required minlength="6" autocomplete="new-password">
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg">注册</button>
    </form>

    <div style="text-align: center; margin-top: 20px; font-size: 14px;">
      <a href="/login" style="color: var(--gold); text-decoration: none;">已有账号，去登录</a>
    </div>
  </div>
</div>
{% endblock %}
