{% extends "base.html" %}
{% block content %}
<div class="container">

  <div class="page-header animate-fade">
    <h1 class="page-title" data-i18n="consult_page_title">专业命理咨询</h1>
    <p class="page-subtitle" data-i18n="consult_page_subtitle">一对一深度八字分析与人生指导</p>
  </div>

  <div class="card animate-slide consult-main-card">
    <div class="consult-inner">
      <div style="font-size:48px; margin-bottom:16px;">☯</div>
      <div class="consult-intro-title" data-i18n="consult_page_intro_title">为什么选择付费咨询？</div>
      <div class="consult-intro-desc" data-i18n="consult_page_intro_desc">免费排盘提供的是基础命理框架，而一对一咨询能针对您的具体情况，给出更精准、更深入的个性化分析与建议。</div>

      <div class="consult-features">
        <div class="consult-feature-item">
          <span class="consult-feature-icon">🔍</span>
          <div>
            <div class="consult-feature-title" data-i18n="consult_feature1_title">深度解读</div>
            <div class="consult-feature-desc" data-i18n="consult_feature1_desc">针对您的具体问题，逐一分析命盘中的关键信息</div>
          </div>
        </div>
        <div class="consult-feature-item">
          <span class="consult-feature-icon">🎯</span>
          <div>
            <div class="consult-feature-title" data-i18n="consult_feature2_title">精准指导</div>
            <div class="consult-feature-desc" data-i18n="consult_feature2_desc">事业、财运、感情、健康全方位个性化建议</div>
          </div>
        </div>
        <div class="consult-feature-item">
          <span class="consult-feature-icon">📅</span>
          <div>
            <div class="consult-feature-title" data-i18n="consult_feature3_title">时机把握</div>
            <div class="consult-feature-desc" data-i18n="consult_feature3_desc">精准预测重要时间节点，助您把握人生关键机遇</div>
          </div>
        </div>
      </div>

      <div class="consult-scan-title" data-i18n="consult_scan_title">扫描二维码添加好友</div>

      <div class="consult-qr-pair">
        <div class="consult-qr-item">
          <div class="consult-qr-box">
            <img src="{{ url_for('static', filename='weixin.jpg') }}" alt="WeChat QR" class="consult-qr-img">
          </div>
          <div class="consult-qr-name">
            <span class="consult-dot" style="background:#07c160;"></span>
            <span data-i18n="footer_wechat">微信</span>
          </div>
        </div>
        <div class="consult-qr-item">
          <div class="consult-qr-box">
            <img src="{{ url_for('static', filename='line.jpg') }}" alt="LINE QR" class="consult-qr-img">
          </div>
          <div class="consult-qr-name">
            <span class="consult-dot" style="background:#00c300;"></span>
            <span>LINE</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div style="text-align:center; margin-top:24px;">
    <a href="/" class="consult-back-link" data-i18n="back">← 返回首页</a>
  </div>

</div>
{% endblock %}
