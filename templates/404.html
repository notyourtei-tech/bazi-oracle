{% extends "base.html" %}
{% block content %}
<div class="container">
  <div class="page-header animate-fade">
    <h1 class="page-title" data-i18n="page_not_found">页面未找到</h1>
  </div>
  <div class="card animate-slide" style="text-align: center; padding: 40px 20px;">
    <div style="font-size: 64px; margin-bottom: 16px;">🔍</div>
    <p style="font-size: 18px; margin-bottom: 8px;" data-i18n="error_404_title">抱歉，您访问的页面不存在</p>
    <p style="color: var(--text-muted); margin-bottom: 24px;" data-i18n="error_404_desc">请检查网址是否正确，或返回首页</p>
    <a href="/" class="btn btn-primary" data-i18n="back_to_home">返回首页</a>
  </div>
</div>
{% endblock %}
