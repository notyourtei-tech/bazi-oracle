{% extends "base.html" %}
{% block content %}
<div class="container">
  <div class="page-header animate-fade">
    <h1 class="page-title" data-i18n="login">登录</h1>
  </div>

  <div class="card animate-slide" style="max-width: 400px; margin: 0 auto;">
    {% if error %}
    <div style="padding: 12px 16px; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: var(--radius-md); margin-bottom: 16px; color: var(--danger); font-size: 14px;">
      {{ error }}
    </div>
    {% endif %}

    <form method="post">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="form-group" style="margin-bottom: 16px;">
        <label class="form-label" data-i18n="name">姓名</label>
        <input type="text" name="username" class="form-input" data-i18n-placeholder="name_placeholder" placeholder="请输入姓名" required autocomplete="username" maxlength="20">
      </div>
      
      <div class="form-group" style="margin-bottom: 24px;">
        <label class="form-label" data-i18n="password">密码</label>
        <input type="password" name="password" class="form-input" data-i18n-placeholder="password_placeholder" placeholder="请输入密码" required autocomplete="current-password" minlength="8">
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" data-i18n="login">登录</button>
    </form>

    <div style="text-align: center; margin-top: 20px; font-size: 14px;">
      <a href="/register" style="color: var(--gold); text-decoration: none;" data-i18n="go_register">去注册</a>
    </div>
  </div>
</div>
{% endblock %}
