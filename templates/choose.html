{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2 class="sec-title">{{ T["choose_lang"] }}</h2>
  <p class="muted">{{ T["choose_lang_tip"] }}</p>
  <div class="lang-grid">
    {% for l in LANGS %}
      <a class="btn lang" href="{{ url_for('set_lang', lang=l, next='/') }}">{{ LANG_LABELS[l] }}</a>
    {% endfor %}
  </div>
</section>
{% endblock %}
