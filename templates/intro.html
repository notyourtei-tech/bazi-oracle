{% extends "base.html" %}
{% block content %}

<div class="container">
  <div class="card center">
    <h1 class="title">{{ T["intro_title"] }}</h1>
    <p class="para">{{ T["intro_p1"] }}</p>
    <p class="para muted">{{ T["intro_p2"] }}</p>

    <div class="row">
      <a class="btn" href="{{ url_for('form') }}">{{ T["start_button"] }}</a>
      <a class="btn ghost" href="{{ url_for('login') }}">{{ T["login_or_try"] }}</a>
    </div>
  </div>
</div>

{% endblock %}
