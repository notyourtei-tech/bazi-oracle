{% extends "base.html" %}

{% block content %}
<section class="card">
  <h1 class="card-title">{{ t.app_title }}</h1>

  <form method="post" action="{{ url_for('result', lang=lang) }}" class="form">
    <input type="hidden" name="lang" value="{{ lang }}">

    <div class="form-row">
      <label class="form-label">{{ t.method_label }}</label>
      <div class="radio-group">
        <label><input type="radio" name="method" value="coin" checked> {{ t.method_coin }}</label>
        <label><input type="radio" name="method" value="time"> {{ t.method_time }}</label>
        <label><input type="radio" name="method" value="number"> {{ t.method_number }}</label>
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">Number</label>
      <input type="text" name="number" class="text-input" placeholder="{{ t.number_placeholder }}">
    </div>

    <div class="form-row">
      <label class="form-label">{{ t.question_label }}</label>
      <textarea name="question" class="textarea" rows="3"
                placeholder="{{ t.question_placeholder }}"></textarea>
    </div>

    <div class="form-row form-row-center">
      <button type="submit" class="btn-primary">{{ t.btn_start }}</button>
    </div>
  </form>
</section>
{% endblock %}
